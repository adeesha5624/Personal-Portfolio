<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('error', (event) => {
        document.body.innerHTML += `<div style="color:red;font-family:monospace;padding:20px;z-index:9999;position:fixed;top:0;left:0;background:white;width:100%;">${event.message} <br> ${event.filename}:${event.lineno} <br> ${event.error?.stack}</div>`;
      });
    </script>
  </body>
</html>
